services:
  - type: web
    name: enforcenet-dashboard
    env: static
    buildCommand: sed -i "s|RENDER_API_URL|$API_URL|g" src/environments/environment.prod.ts && npm ci && npm run build
    staticPublishPath: dist/enforcenet-dashboard/browser
    envVars:
      - key: API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
